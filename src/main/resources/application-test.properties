cryostat.connections.ttl=60s

quarkus.test.env.JAVA_OPTS_APPEND=-Djava.util.logging.manager=org.jboss.logmanager.LogManager -Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.port=9091 -Dcom.sun.management.jmxremote.rmi.port=9091 -Djava.rmi.server.hostname=127.0.0.1 -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcom.sun.management.jmxremote.local.only=false

cryostat.agent.tls.required=false

quarkus.hibernate-orm.log.sql=true
quarkus.flyway.clean-at-start=true

storage.presigned-transfers.enabled=false

quarkus.datasource.devservices.enabled=true

quarkus.s3.devservices.enabled=false
# stubbed out default configuration where S3 is not needed
storage.buckets.attempt-create=false
quarkus.s3.endpoint-override=http://no-s3.local:4566
quarkus.s3.path-style-access=true
quarkus.s3.aws.region=us-east-1
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=unused
quarkus.s3.aws.credentials.static-provider.secret-access-key=unused

grafana-dashboard.url=http://dashboard.no-grafana.local
grafana-datasource.url=http://datasource.no-grafana.local

cryostat.discovery.plugins.ping.startup-grace-period-ms=0
quarkus.fault-tolerance."io.cryostat.credentials.Credentials/create".rate-limit.value=999999
quarkus.fault-tolerance."io.cryostat.discovery.Discovery/register".rate-limit.value=999999
quarkus.fault-tolerance."io.cryostat.discovery.Discovery/publish".rate-limit.value=999999
quarkus.fault-tolerance."io.cryostat.discovery.Discovery/publishWithContext".rate-limit.value=999999
