name: CI build

concurrency:
  group: ci-${{ github.run_id }}
  cancel-in-progress: true

on:
  issue_comment:
    types:
      - created

env:
  TESTCONTAINERS_RYUK_DISABLED: true

jobs:
  check-before-build:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'cryostatio' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/build_test')

    permissions:
      pull-requests: write
    steps:
    - name: Fail if needs-triage label applied
      if: ${{ contains(github.event.issue.labels.*.name, 'needs-triage') }}
      run: exit 1
    - name: Show warning if permission is denied
      if: |
        !(github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER')
        && (!contains(github.event.issue.labels.*.name, 'safe-to-test') || github.event.issue.user.login != github.event.comment.user.login)
      uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
      with:
        message: |-
          You do not have permission to run the /build_test command. Please ask @cryostatio/reviewers
          to resolve the issue.
    - name: Fail if command permission is denied
      if: |
        !(github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER')
        && (!contains(github.event.issue.labels.*.name, 'safe-to-test') || github.event.issue.user.login != github.event.comment.user.login)
      run: exit 1
    - name: React to comment
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      with:
        script: |
            const {owner, repo} = context.issue
            github.rest.reactions.createForIssueComment({
              owner,
              repo,
              comment_id: context.payload.comment.id,
              content: "+1",
            });

  checkout-branch:
    runs-on: ubuntu-latest
    needs: [check-before-build]
    outputs:
      PR_head_ref: ${{ fromJSON(steps.comment-branch.outputs.result).ref }}
      PR_head_sha: ${{ fromJSON(steps.comment-branch.outputs.result).sha }}
      PR_num: ${{ fromJSON(steps.comment-branch.outputs.result).num }}
      PR_repo: ${{ fromJSON(steps.comment-branch.outputs.result).repo }}
    permissions:
      pull-requests: read
    steps:
    - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      id: comment-branch
      with:
        script: |
          const result = await github.rest.pulls.get ({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number
          })
          return { repo: result.data.head.repo.full_name, num: result.data.number, sha: result.data.head.sha, ref: result.data.head.ref }

  start-comment:
    runs-on: ubuntu-latest
    needs: [check-before-build]
    permissions:
      pull-requests: write
    steps:
    - name: Leave Actions Run Comment
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      with:
        script: |
          const runURL = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.run_id }}`;
          const currentTime = new Date().toLocaleString('en-US', { timeZone: 'America/Toronto' });
          const commentBody = `Workflow started at ${currentTime}. [View Actions Run](${runURL}).`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: commentBody
          });

  unit-test:
    needs: [checkout-branch]
    runs-on: ubuntu-latest
    env:
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: '5'
      deps-cache-name: cache-yarn
      build-cache-name: cache-webpack
    name: Unit test
    permissions:
      packages: write
      contents: read
      pull-requests: write
      statuses: write
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        repository: ${{ needs.checkout-branch.outputs.PR_repo }}
        ref: ${{ needs.checkout-branch.outputs.PR_head_ref }}
        submodules: false
        fetch-depth: 0
    - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'
    - uses: DamianReeves/write-file-action@6929a9a6d1807689191dcc8bbe62b54d70a32b42 # v1.3
      with:
        path: /home/runner/.config/containers/registries.conf.d/999-block-docker-io.conf
        write-mode: overwrite
        contents: |
          [[registry]]
          location = "docker.io"
          blocked = true
    - uses: DamianReeves/write-file-action@6929a9a6d1807689191dcc8bbe62b54d70a32b42 # v1.3
      with:
        path: /home/runner/.config/containers/containers.conf.d/999-service-timeout.conf
        write-mode: overwrite
        contents: |
          [engine]
          service_timeout=0
    - name: Install ansi2txt utility
      run: |
        sudo apt-get update
        sudo apt-get install -y colorized-logs
    - name: Set pending commit status
      uses: daltonbr/set-commit-status-action@2a09190f6d04d912bca5ede8094b5d5dce303ebb # v3.0.1
      if: always()
      with:
        context: unit-test
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha}}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: pending
    - name: Run unit tests
      id: run-tests
      continue-on-error: true
      run: |
        timeout 1h sh ./mvnw -B -U \
          -Dquarkus.container-image.builder=docker \
          -Dspotless.check.skip \
          -Dquarkus.quinoa=false \
          -Dquarkus.log.level=debug \
          -Dquarkus.hibernate-orm.log.sql=true \
          -Dquarkus.http.access-log.enabled=true \
          clean test > test.log 2>&1
    - run: tail -500l test.log
      if: always()
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: cryostat-unittest.log
        path: test.log
    - name: Add workflow result as comment on PR
      if: always()
      continue-on-error: true
      run: |
        > comment.txt
        echo "${{ github.workflow }}:" >> comment.txt
        ./parse-test-results.bash test.log "Unit" >> comment.txt
        echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> comment.txt
        gh pr comment ${{ needs.checkout-branch.outputs.PR_num }} --repo ${{ github.repository }} --body-file comment.txt
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Set latest commit status
      uses: daltonbr/set-commit-status-action@2a09190f6d04d912bca5ede8094b5d5dce303ebb # v3.0.1
      if: always()
      with:
        context: unit-test
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha}}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ steps.run-tests.outcome }}

  integration-test:
    needs: [checkout-branch]
    runs-on: ubuntu-latest
    env:
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: '5'
      deps-cache-name: cache-yarn
      build-cache-name: cache-webpack
    name: Integration test
    permissions:
      packages: write
      contents: read
      pull-requests: write
      statuses: write
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        repository: ${{ needs.checkout-branch.outputs.PR_repo }}
        ref: ${{ needs.checkout-branch.outputs.PR_head_ref }}
        submodules: true
        fetch-depth: 0
    - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'
    - uses: DamianReeves/write-file-action@6929a9a6d1807689191dcc8bbe62b54d70a32b42 # v1.3
      with:
        path: /home/runner/.config/containers/registries.conf.d/999-block-docker-io.conf
        write-mode: overwrite
        contents: |
          [[registry]]
          location = "docker.io"
          blocked = true
    - uses: DamianReeves/write-file-action@6929a9a6d1807689191dcc8bbe62b54d70a32b42 # v1.3
      with:
        path: /home/runner/.config/containers/containers.conf.d/999-service-timeout.conf
        write-mode: overwrite
        contents: |
          [engine]
          service_timeout=0
    - name: Install ansi2txt utility
      run: |
        sudo apt-get update
        sudo apt-get install -y colorized-logs
    - name: Set pending commit status
      uses: daltonbr/set-commit-status-action@2a09190f6d04d912bca5ede8094b5d5dce303ebb # v3.0.1
      if: always()
      with:
        context: integration-test
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha}}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: pending
    - run: git submodule init && git submodule update
    - name: Cache yarn packages
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: "./src/main/webui/.yarn/cache"
        key: ${{ runner.os }}-build-${{ env.deps-cache-name }}-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.deps-cache-name }}-
          ${{ runner.os }}-build-
          ${{ runner.os }}-
    - name: Cache frontend build
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: "./src/main/webui/.build_cache"
        key: ${{ runner.os }}-build-${{ env.build-cache-name }}-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.build-cache-name }}-
          ${{ runner.os }}-build-
          ${{ runner.os }}-
    - name: Initialize web assets
      run: |
        cd src/main/webui
        yarn install && yarn yarn:frzinstall
        cd -
    - name: Run integration tests
      id: run-tests
      continue-on-error: true
      run: |
        timeout 1h sh ./mvnw -B -U \
          -Dquarkus.container-image.builder=docker \
          -Dskip.surefire.tests \
          -Dspotless.check.skip \
          -Dspotbugs.skip \
          -Dquarkus.log.level=debug \
          -Dquarkus.hibernate-orm.log.sql=true \
          -Dquarkus.http.access-log.enabled=true \
          clean verify > test.log 2>&1
    - run: tail -500l test.log
      if: always()
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: cryostat-itest-harness.log
        path: test.log
    - run: tail -500l target/quarkus.log
      if: always()
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: cryostat-itest-server.log
        path: target/quarkus.log
    - name: Add workflow result as comment on PR
      if: always()
      continue-on-error: true
      run: |
        > comment.txt
        echo "${{ github.workflow }}:" >> comment.txt
        ./parse-test-results.bash test.log "Integration" >> comment.txt
        echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> comment.txt
        gh pr comment ${{ needs.checkout-branch.outputs.PR_num }} --repo ${{ github.repository }} --body-file comment.txt
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Set latest commit status
      uses: daltonbr/set-commit-status-action@2a09190f6d04d912bca5ede8094b5d5dce303ebb # v3.0.1
      if: always()
      with:
        context: integration-test
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha}}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ steps.run-tests.outcome }}

  update-api-schemas:
    needs: [checkout-branch]
    runs-on: ubuntu-latest
    env:
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: '5'
    permissions:
      statuses: write
    outputs:
      OPENAPI_STATUS: ${{ steps.schema-update.outputs.openapi_status }}
      GRAPHQL_STATUS: ${{ steps.schema-update.outputs.graphql_status }}
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        repository: ${{ needs.checkout-branch.outputs.PR_repo }}
        ref: ${{ needs.checkout-branch.outputs.PR_head_ref }}
        submodules: true
        fetch-depth: 0
    - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'
    - name: Set pending commit status for OpenAPI schema
      uses: daltonbr/set-commit-status-action@2a09190f6d04d912bca5ede8094b5d5dce303ebb # v3.0.1
      with:
        context: openapi-schema-check
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: pending
    - name: Set pending commit status for GraphQL schema
      uses: daltonbr/set-commit-status-action@2a09190f6d04d912bca5ede8094b5d5dce303ebb # v3.0.1
      with:
        context: graphql-schema-check
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: pending
    - run: git submodule init && git submodule update
    - name: Run Quarkus and fetch API schemas
      continue-on-error: true
      run: bash /home/runner/work/cryostat/cryostat/schema/update.bash 90 15
    - id: schema-update
      name: Diff API schemas
      run: |
        test -f /home/runner/work/cryostat/cryostat/schema/openapi.yaml
        test -f /home/runner/work/cryostat/cryostat/schema/schema.graphql

        git diff -U10 /home/runner/work/cryostat/cryostat/schema/openapi.yaml > /home/runner/work/openapi.diff
        OPENAPI_STATUS=$([ -s /home/runner/work/openapi.diff ] && echo 1 || echo 0)
        git diff -U10 /home/runner/work/cryostat/cryostat/schema/schema.graphql > /home/runner/work/graphql.diff
        GRAPHQL_STATUS=$([ -s /home/runner/work/graphql.diff ] && echo 1 || echo 0)
        echo "openapi_status=${OPENAPI_STATUS}" >> "$GITHUB_OUTPUT"
        echo "graphql_status=${GRAPHQL_STATUS}" >> "$GITHUB_OUTPUT"
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: openapi-diff
        path: /home/runner/work/openapi.diff
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: graphql-diff
        path: /home/runner/work/graphql.diff

  update-notifications-schema:
    needs: [checkout-branch]
    runs-on: ubuntu-latest
    env:
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: '5'
    permissions:
      statuses: write
    outputs:
      NOTIFICATIONS_STATUS: ${{ steps.notifications-update.outputs.notifications_status }}
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        repository: ${{ needs.checkout-branch.outputs.PR_repo }}
        ref: ${{ needs.checkout-branch.outputs.PR_head_ref }}
        submodules: true
        fetch-depth: 0
    - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'
    - name: Set pending commit status for Notifications schema
      uses: daltonbr/set-commit-status-action@2a09190f6d04d912bca5ede8094b5d5dce303ebb # v3.0.1
      with:
        context: notifications-schema-check
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: pending
    - run: git submodule init && git submodule update
    - id: notifications-update
      name: Update notifications schema
      run: |
        bash /home/runner/work/cryostat/cryostat/schema/generate-notifications.bash

        test -f /home/runner/work/cryostat/cryostat/schema/notifications.yaml

        git diff -U10 /home/runner/work/cryostat/cryostat/schema/notifications.yaml > /home/runner/work/notifications.diff
        NOTIFICATIONS_STATUS=$([ -s /home/runner/work/notifications.diff ] && echo 1 || echo 0)
        echo "notifications_status=${NOTIFICATIONS_STATUS}" >> "$GITHUB_OUTPUT"
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: notifications-diff
        path: /home/runner/work/notifications.diff

  compare-schemas:
    needs: [update-api-schemas, update-notifications-schema, checkout-branch]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: openapi-diff
        path: diffs
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: graphql-diff
        path: diffs
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: notifications-diff
        path: diffs
    - name: Comment schema check results
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      with:
        script: |
          const fs = require('fs');
          const diffFmt = s => "```diff\n" + s + "\n```";
          const openapiStatus = '${{ needs.update-api-schemas.outputs.OPENAPI_STATUS }}';
          const graphqlStatus = '${{ needs.update-api-schemas.outputs.GRAPHQL_STATUS }}';
          const notificationsStatus = '${{ needs.update-notifications-schema.outputs.NOTIFICATIONS_STATUS }}';
          const lines = [];
          lines.push(openapiStatus === '0'
            ? 'No OpenAPI schema changes detected.'
            : 'OpenAPI schema change detected:\n\n' + diffFmt(fs.readFileSync('diffs/openapi.diff')));
          lines.push(graphqlStatus === '0'
            ? 'No GraphQL schema changes detected.'
            : 'GraphQL schema change detected:\n\n' + diffFmt(fs.readFileSync('diffs/graphql.diff')));
          lines.push(notificationsStatus === '0'
            ? 'No WebSocket notifications schema changes detected.'
            : 'WebSocket notifications schema change detected:\n\n' + diffFmt(fs.readFileSync('diffs/notifications.diff')));
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: lines.join('\n\n')
          });
    - name: Set OpenAPI schema commit status
      uses: daltonbr/set-commit-status-action@2a09190f6d04d912bca5ede8094b5d5dce303ebb # v3.0.1
      if: always()
      with:
        context: openapi-schema-check
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ needs.update-api-schemas.outputs.OPENAPI_STATUS == '0' && 'success' || 'failure' }}
        description: ${{ needs.update-api-schemas.outputs.OPENAPI_STATUS == '0' && 'No schema changes' || 'Schema update required' }}
    - name: Set GraphQL schema commit status
      uses: daltonbr/set-commit-status-action@2a09190f6d04d912bca5ede8094b5d5dce303ebb # v3.0.1
      if: always()
      with:
        context: graphql-schema-check
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ needs.update-api-schemas.outputs.GRAPHQL_STATUS == '0' && 'success' || 'failure' }}
        description: ${{ needs.update-api-schemas.outputs.GRAPHQL_STATUS == '0' && 'No schema changes' || 'Schema update required' }}
    - name: Set Notifications schema commit status
      uses: daltonbr/set-commit-status-action@2a09190f6d04d912bca5ede8094b5d5dce303ebb # v3.0.1
      if: always()
      with:
        context: notifications-schema-check
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ needs.update-notifications-schema.outputs.NOTIFICATIONS_STATUS == '0' && 'success' || 'failure' }}
        description: ${{ needs.update-notifications-schema.outputs.NOTIFICATIONS_STATUS == '0' && 'No schema changes' || 'Schema update required' }}
