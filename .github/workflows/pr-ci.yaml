name: CI build

concurrency:
  group: ci-${{ github.run_id }}
  cancel-in-progress: true

on:
  issue_comment:
    types:
      - created

env:
  TESTCONTAINERS_RYUK_DISABLED: true

jobs:
  check-before-build:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'cryostatio' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/build_test')

    permissions:
      pull-requests: write
    steps:
    - name: Fail if needs-triage label applied
      if: ${{ contains(github.event.issue.labels.*.name, 'needs-triage') }}
      run: exit 1
    - name: Show warning if permission is denied
      if: |
        !(github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER')
        && (!contains(github.event.issue.labels.*.name, 'safe-to-test') || github.event.issue.user.login != github.event.comment.user.login)
      uses: thollander/actions-comment-pull-request@v3
      with:
        message: |-
          You do not have permission to run the /build_test command. Please ask @cryostatio/reviewers
          to resolve the issue.
    - name: Fail if command permission is denied
      if: |
        !(github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER')
        && (!contains(github.event.issue.labels.*.name, 'safe-to-test') || github.event.issue.user.login != github.event.comment.user.login)
      run: exit 1
    - name: React to comment
      uses: actions/github-script@v9
      with:
        script: |
            const {owner, repo} = context.issue
            github.rest.reactions.createForIssueComment({
              owner,
              repo,
              comment_id: context.payload.comment.id,
              content: "+1",
            });

  checkout-branch:
    runs-on: ubuntu-latest
    needs: [check-before-build]
    outputs:
      PR_head_ref: ${{ fromJSON(steps.comment-branch.outputs.result).ref }}
      PR_head_sha: ${{ fromJSON(steps.comment-branch.outputs.result).sha }}
      PR_num: ${{ fromJSON(steps.comment-branch.outputs.result).num }}
      PR_repo: ${{ fromJSON(steps.comment-branch.outputs.result).repo }}
    permissions:
      pull-requests: read
    steps:
    - uses: actions/github-script@v9
      id: comment-branch
      with:
        script: |
          const result = await github.rest.pulls.get ({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number
          })
          return { repo: result.data.head.repo.full_name, num: result.data.number, sha: result.data.head.sha, ref: result.data.head.ref }

  start-comment:
    runs-on: ubuntu-latest
    needs: [check-before-build]
    permissions:
      pull-requests: write
    steps:
    - name: Leave Actions Run Comment
      uses: actions/github-script@v9
      with:
        script: |
          const runURL = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.run_id }}`;
          const currentTime = new Date().toLocaleString('en-US', { timeZone: 'America/Toronto' });
          const commentBody = `Workflow started at ${currentTime}. [View Actions Run](${runURL}).`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: commentBody
          });

  unit-test:
    needs: [checkout-branch]
    runs-on: ubuntu-latest
    env:
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: '5'
      deps-cache-name: cache-yarn
      build-cache-name: cache-webpack
    name: Unit test
    permissions:
      packages: write
      contents: read
      pull-requests: write
      statuses: write
    steps:
    - uses: actions/checkout@v6
      with:
        repository: ${{ needs.checkout-branch.outputs.PR_repo }}
        ref: ${{ needs.checkout-branch.outputs.PR_head_ref }}
        submodules: false
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - uses: DamianReeves/write-file-action@v1.3
      with:
        path: /home/runner/.config/containers/registries.conf.d/999-block-docker-io.conf
        write-mode: overwrite
        contents: |
          [[registry]]
          location = "docker.io"
          blocked = true
    - name: Install ansi2txt utility
      run: |
        sudo apt-get update
        sudo apt-get install -y colorized-logs
    - name: Set pending commit status
      uses: myrotvorets/set-commit-status-action@v2.0.1
      if: always()
      with:
        context: unit-test
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha}}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: pending
    - name: Run unit tests
      id: run-tests
      continue-on-error: true
      run: |
        ./mvnw -B -U \
          -Dquarkus.container-image.builder=docker \
          -Dspotless.check.skip \
          -Dquarkus.quinoa=false \
          -Dquarkus.log.level=debug \
          -Dquarkus.hibernate-orm.log.sql=true \
          -Dquarkus.http.access-log.enabled=true \
          clean test > test.log 2>&1
    - run: tail -500l test.log
      if: always()
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: cryostat-unittest.log
        path: test.log
    - name: Add workflow result as comment on PR
      if: always()
      continue-on-error: true
      run: |
        > comment.txt
        echo "${{ github.workflow }}:" >> comment.txt
        ./parse-test-results.bash test.log "Unit" >> comment.txt
        echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> comment.txt
        gh pr comment ${{ needs.checkout-branch.outputs.PR_num }} --repo ${{ github.repository }} --body-file comment.txt
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Set latest commit status
      uses: myrotvorets/set-commit-status-action@v2.0.1
      if: always()
      with:
        context: unit-test
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha}}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ steps.run-tests.outcome }}

  integration-test:
    needs: [checkout-branch]
    runs-on: ubuntu-latest
    env:
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: '5'
      deps-cache-name: cache-yarn
      build-cache-name: cache-webpack
    name: Integration test
    permissions:
      packages: write
      contents: read
      pull-requests: write
      statuses: write
    steps:
    - uses: actions/checkout@v6
      with:
        repository: ${{ needs.checkout-branch.outputs.PR_repo }}
        ref: ${{ needs.checkout-branch.outputs.PR_head_ref }}
        submodules: true
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - uses: DamianReeves/write-file-action@v1.3
      with:
        path: /home/runner/.config/containers/registries.conf.d/999-block-docker-io.conf
        write-mode: overwrite
        contents: |
          [[registry]]
          location = "docker.io"
          blocked = true
    - name: Install ansi2txt utility
      run: |
        sudo apt-get update
        sudo apt-get install -y colorized-logs
    - name: Set pending commit status
      uses: myrotvorets/set-commit-status-action@v2.0.1
      if: always()
      with:
        context: integration-test
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha}}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: pending
    - run: git submodule init && git submodule update
    - name: Cache yarn packages
      uses: actions/cache@v5
      with:
        path: "./src/main/webui/.yarn/cache"
        key: ${{ runner.os }}-build-${{ env.deps-cache-name }}-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.deps-cache-name }}-
          ${{ runner.os }}-build-
          ${{ runner.os }}-
    - name: Cache frontend build
      uses: actions/cache@v5
      with:
        path: "./src/main/webui/.build_cache"
        key: ${{ runner.os }}-build-${{ env.build-cache-name }}-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.build-cache-name }}-
          ${{ runner.os }}-build-
          ${{ runner.os }}-
    - name: Initialize web assets
      run: |
        cd src/main/webui
        yarn install && yarn yarn:frzinstall
        cd -
    - name: Add CRIU PPA
      run: sudo add-apt-repository ppa:criu/ppa
    - name: Run integration tests
      id: run-tests
      continue-on-error: true
      run: |
        ./mvnw -B -U \
          -Dquarkus.container-image.builder=docker \
          -Dskip.surefire.tests \
          -Dspotless.check.skip \
          -Dspotbugs.skip \
          -Dquarkus.log.level=debug \
          -Dquarkus.hibernate-orm.log.sql=true \
          -Dquarkus.http.access-log.enabled=true \
          clean verify > test.log 2>&1
    - run: tail -500l test.log
      if: always()
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: cryostat-itest-harness.log
        path: test.log
    - run: tail -500l target/quarkus.log
      if: always()
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: cryostat-itest-server.log
        path: target/quarkus.log
    - name: Add workflow result as comment on PR
      if: always()
      continue-on-error: true
      run: |
        > comment.txt
        echo "${{ github.workflow }}:" >> comment.txt
        ./parse-test-results.bash test.log "Integration" >> comment.txt
        echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> comment.txt
        gh pr comment ${{ needs.checkout-branch.outputs.PR_num }} --repo ${{ github.repository }} --body-file comment.txt
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Set latest commit status
      uses: myrotvorets/set-commit-status-action@v2.0.1
      if: always()
      with:
        context: integration-test
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha}}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ steps.run-tests.outcome }}

  update-schemas:
    needs: [checkout-branch]
    runs-on: ubuntu-latest
    env:
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: '5'
    permissions:
      statuses: write
    outputs:
      OPENAPI_STATUS: ${{ steps.schema-update.outputs.openapi_status }}
      OPENAPI_DIFF_FILE: ${{ steps.schema-update.outputs.openapi_diff_file }}
      GRAPHQL_STATUS: ${{ steps.schema-update.outputs.graphql_status }}
      GRAPHQL_DIFF_FILE: ${{ steps.schema-update.outputs.graphql_diff_file }}
      NOTIFICATIONS_STATUS: ${{ steps.schema-update.outputs.notifications_status }}
      NOTIFICATIONS_DIFF_FILE: ${{ steps.schema-update.outputs.notifications_diff_file }}
    steps:
    - uses: actions/checkout@v6
      with:
        repository: ${{ needs.checkout-branch.outputs.PR_repo }}
        ref: ${{ needs.checkout-branch.outputs.PR_head_ref }}
        submodules: true
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - name: Set pending commit status for OpenAPI schema
      uses: myrotvorets/set-commit-status-action@v2.0.1
      with:
        context: openapi-schema-check
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: pending
    - name: Set pending commit status for GraphQL schema
      uses: myrotvorets/set-commit-status-action@v2.0.1
      with:
        context: graphql-schema-check
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: pending
    - name: Set pending commit status for Notifications schema
      uses: myrotvorets/set-commit-status-action@v2.0.1
      with:
        context: notifications-schema-check
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: pending
    - run: git submodule init && git submodule update
    - id: schema-update
      name: Update schemas
      run: |
        bash /home/runner/work/cryostat/cryostat/schema/update.bash 90 15
        set +e
        git diff -U10 --exit-code /home/runner/work/cryostat/cryostat/schema/openapi.yaml > /home/runner/work/openapi.diff
        echo "openapi_status=$?" >> "$GITHUB_OUTPUT"
        echo "openapi_diff_file=openapi.diff" >> "$GITHUB_OUTPUT"
        git diff -U10 --exit-code /home/runner/work/cryostat/cryostat/schema/schema.graphql > /home/runner/work/graphql.diff
        echo "graphql_status=$?" >> "$GITHUB_OUTPUT"
        echo "graphql_diff_file=graphql.diff" >> "$GITHUB_OUTPUT"
        git diff -U10 --exit-code /home/runner/work/cryostat/cryostat/schema/notifications.yaml > /home/runner/work/notifications.diff
        echo "notifications_status=$?" >> "$GITHUB_OUTPUT"
        echo "notifications_diff_file=notifications.diff" >> "$GITHUB_OUTPUT"
    - uses: actions/upload-artifact@v7
      with:
        name: openapi-diff
        path: /home/runner/work/openapi.diff
    - uses: actions/upload-artifact@v7
      with:
        name: graphql-diff
        path: /home/runner/work/graphql.diff
    - uses: actions/upload-artifact@v7
      with:
        name: notifications-diff
        path: /home/runner/work/notifications.diff

  compare-openapi-schema:
    needs: [update-schemas, checkout-branch]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: openapi-diff
    - name: Comment schema check result
      uses: actions/github-script@v9
      with:
        script: |
          const diffFmt = s => {
            return "```diff\n" + s + "\n```";
          };
          const commentBody = ${{ needs.update-schemas.outputs.OPENAPI_STATUS }} == '0'
            ? `No OpenAPI schema changes detected.`
            : `OpenAPI schema change detected:\n\n${diffFmt(require('fs').readFileSync('${{ needs.update-schemas.outputs.OPENAPI_DIFF_FILE }}'))}`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: commentBody
          });
    - name: Set commit status
      uses: myrotvorets/set-commit-status-action@v2.0.1
      if: always()
      with:
        context: openapi-schema-check
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ needs.update-schemas.outputs.OPENAPI_STATUS == '0' && 'success' || 'failure' }}
        description: ${{ needs.update-schemas.outputs.OPENAPI_STATUS == '0' && 'No schema changes' || 'Schema update required' }}

  compare-graphql-schema:
    needs: [update-schemas, checkout-branch]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: graphql-diff
    - name: Comment schema check result
      uses: actions/github-script@v9
      with:
        script: |
          const diffFmt = s => {
            return "```diff\n" + s + "\n```";
          };
          const commentBody = ${{ needs.update-schemas.outputs.GRAPHQL_STATUS }} == '0'
            ? `No GraphQL schema changes detected.`
            : `GraphQL schema change detected:\n\n${diffFmt(require('fs').readFileSync('${{ needs.update-schemas.outputs.GRAPHQL_DIFF_FILE }}'))}`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: commentBody
          });
    - name: Set commit status
      uses: myrotvorets/set-commit-status-action@v2.0.1
      if: always()
      with:
        context: graphql-schema-check
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ needs.update-schemas.outputs.GRAPHQL_STATUS == '0' && 'success' || 'failure' }}
        description: ${{ needs.update-schemas.outputs.GRAPHQL_STATUS == '0' && 'No schema changes' || 'Schema update required' }}

  compare-notifications-schema:
    needs: [update-schemas, checkout-branch]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: notifications-diff
    - name: Comment schema check result
      uses: actions/github-script@v9
      with:
        script: |
          const diffFmt = s => {
            return "```diff\n" + s + "\n```";
          };
          const commentBody = ${{ needs.update-schemas.outputs.NOTIFICATIONS_STATUS }} == '0'
            ? `No WebSocket notifications schema changes detected.`
            : `WebSocket notifications schema change detected:\n\n${diffFmt(require('fs').readFileSync('${{ needs.update-schemas.outputs.NOTIFICATIONS_DIFF_FILE }}'))}`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: commentBody
          });
    - name: Set commit status
      uses: myrotvorets/set-commit-status-action@v2.0.1
      if: always()
      with:
        context: notifications-schema-check
        sha: ${{ needs.checkout-branch.outputs.PR_head_sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ needs.update-schemas.outputs.NOTIFICATIONS_STATUS == '0' && 'success' || 'failure' }}
        description: ${{ needs.update-schemas.outputs.NOTIFICATIONS_STATUS == '0' && 'No schema changes' || 'Schema update required' }}
